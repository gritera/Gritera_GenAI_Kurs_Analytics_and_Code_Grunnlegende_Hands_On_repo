name: 'kurs_dataplattform'
version: '1.0.0'

profile: 'kurs_dataplattform'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  kurs_dataplattform:
    +schema: raw
    northwind:
      # Northwind-datasettet er ikke en del av kursøvelsene, men ligger
      # tilgjengelig for senere bruk. Sett +enabled: true for å laste dem.
      +enabled: false
