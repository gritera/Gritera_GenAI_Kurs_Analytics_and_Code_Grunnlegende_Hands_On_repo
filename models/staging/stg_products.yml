version: 2

models:
  - name: stg_products
    description: "Staging-modell for produkter. Renser og standardiserer data fra raw_products."
    columns:
      - name: product_id
        description: "Unik identifikator for produktet."
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Produktnavn."
        tests:
          - not_null
      - name: category
        description: "Produktkategori, for eksempel kaffe, te eller snacks."
        tests:
          - not_null
      - name: price_nok
        description: "Salgspris i NOK."
        tests:
          - not_null
      - name: cost_nok
        description: "Kostpris i NOK."
      - name: supplier
        description: "Leverandør av produktet."
      - name: is_available
        description: "Om produktet er tilgjengelig for salg."
      - name: created_at
        description: "Dato produktet ble lagt til i katalogen."
        tests:
          - not_null
